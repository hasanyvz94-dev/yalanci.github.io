<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HY Maket Görüntüleyici</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
    AFRAME.registerComponent('touch-rotate-scale', {
        init: function () {
            const el = this.el;
            this.initialDistance = null;
            this.initialScale = el.object3D.scale.clone();
            
            // Durum Değişkenleri
            let isDragging = false;
            let lastX = 0;

            // Sahneye erişim
            const sceneCanvas = el.sceneEl.canvas;

            // Dokunma Başlangıcı
            sceneCanvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    // Tek parmak: Döndürme hazırlığı
                    isDragging = true;
                    lastX = e.touches[0].clientX;
                } else if (e.touches.length === 2) {
                    // İki parmak: Ölçekleme hazırlığı (Döndürmeyi durdur)
                    isDragging = false;
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    this.initialDistance = Math.sqrt(dx * dx + dy * dy);
                    this.initialScale = el.object3D.scale.clone();
                }
            });

            // Hareket Esnası
            sceneCanvas.addEventListener('touchmove', (e) => {
                // Tarayıcının sayfayı aşağı/yukarı kaydırmasını engelle
                if (e.cancelable) e.preventDefault();

                if (isDragging && e.touches.length === 1) {
                    // DÖNDÜRME MANTIĞI
                    const touch = e.touches[0];
                    const deltaX = touch.clientX - lastX;
                    
                    // Y ekseninde (kendi etrafında) döndür
                    el.object3D.rotation.y += deltaX * 0.01; 
                    lastX = touch.clientX;

                } else if (e.touches.length === 2 && this.initialDistance) {
                    // BÜYÜTME/KÜÇÜLTME MANTIĞI
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const currentDist = Math.sqrt(dx * dx + dy * dy);
                    
                    const scaleFactor = currentDist / this.initialDistance;
                    
                    el.object3D.scale.set(
                        this.initialScale.x * scaleFactor,
                        this.initialScale.y * scaleFactor,
                        this.initialScale.z * scaleFactor
                    );
                }
            }, { passive: false });

            // Dokunma Bitişi
            sceneCanvas.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) {
                    this.initialDistance = null;
                }
                if (e.touches.length === 0) {
                    isDragging = false;
                }
            });
        }
    });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; antialias: true;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-marker type="pattern" url="marker.patt">
            <a-entity
                id="model"
                gltf-model="model.glb"
                scale="0.5 0.5 0.5"
                rotation="0 0 0"
                touch-rotate-scale>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
