<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>HY Maket Görüntüleyici</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
    AFRAME.registerComponent('touch-rotate-scale', {
        init: function () {
            const el = this.el;
            this.initialDistance = null;
            this.initialScale = el.object3D.scale.clone();
            
            let isDragging = false;
            let lastX = 0;
            let lastY = 0;

            const sceneCanvas = el.sceneEl.canvas;

            sceneCanvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    isDragging = true;
                    lastX = e.touches[0].clientX;
                    lastY = e.touches[0].clientY;
                } else if (e.touches.length === 2) {
                    isDragging = false;
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    this.initialDistance = Math.sqrt(dx * dx + dy * dy);
                    this.initialScale = el.object3D.scale.clone();
                }
            });

            sceneCanvas.addEventListener('touchmove', (e) => {
                if (e.cancelable) e.preventDefault();

                if (isDragging && e.touches.length === 1) {
                    const touch = e.touches[0];
                    
                    const deltaX = touch.clientX - lastX;
                    const deltaY = touch.clientY - lastY;

                    // Y ekseninde (sağa-sola) döndürme
                    el.object3D.rotation.y += deltaX * 0.01; 
                    
                    // X ekseninde (yukarı-aşağı) döndürme
                    // Not: Bu hareket modelin öne/arkaya eğilmesini sağlar
                    el.object3D.rotation.x += deltaY * 0.01; 

                    lastX = touch.clientX;
                    lastY = touch.clientY;

                } else if (e.touches.length === 2 && this.initialDistance) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const currentDist = Math.sqrt(dx * dx + dy * dy);
                    const scaleFactor = currentDist / this.initialDistance;
                    
                    el.object3D.scale.set(
                        this.initialScale.x * scaleFactor,
                        this.initialScale.y * scaleFactor,
                        this.initialScale.z * scaleFactor
                    );
                }
            }, { passive: false });

            sceneCanvas.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) this.initialDistance = null;
                if (e.touches.length === 0) isDragging = false;
            });
        }
    });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; antialias: true;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-marker type="pattern" url="marker.patt" id="myMarker">
            <a-entity
                id="model"
                gltf-model="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/yalanci.github.io@main/model.glb?v=10"
                scale="0.5 0.5 0.5"
                position="0 0 0"
                touch-rotate-scale>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
