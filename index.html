<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HY Maket Görüntüleyici</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">

<!-- model-viewer -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<!-- AFRAME + AR.js -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<script>
AFRAME.registerComponent('touch-rotate-scale', {
init: function () {
const el = this.el;
this.initialDistance = null;
this.initialScale = el.object3D.scale.clone();

let isDragging = false;
let lastX = 0;

const sceneCanvas = el.sceneEl.canvas;

sceneCanvas.addEventListener('touchstart', (e) => {

if (e.touches.length === 1) {
isDragging = true;
lastX = e.touches[0].clientX;
}

else if (e.touches.length === 2) {

isDragging = false;

const dx = e.touches[0].clientX - e.touches[1].clientX;
const dy = e.touches[0].clientY - e.touches[1].clientY;

this.initialDistance = Math.sqrt(dx * dx + dy * dy);
this.initialScale = el.object3D.scale.clone();
}
});

sceneCanvas.addEventListener('touchmove', (e) => {

if (e.cancelable) e.preventDefault();

if (isDragging && e.touches.length === 1) {

const touch = e.touches[0];
const deltaX = touch.clientX - lastX;

el.object3D.rotation.y += deltaX * 0.01;
lastX = touch.clientX;

}

else if (e.touches.length === 2 && this.initialDistance) {

const dx = e.touches[0].clientX - e.touches[1].clientX;
const dy = e.touches[0].clientY - e.touches[1].clientY;

const currentDist = Math.sqrt(dx * dx + dy * dy);

const scaleFactor = currentDist / this.initialDistance;

el.object3D.scale.set(
this.initialScale.x * scaleFactor,
this.initialScale.y * scaleFactor,
this.initialScale.z * scaleFactor
);
}

},{ passive:false });

sceneCanvas.addEventListener('touchend', (e) => {

if (e.touches.length < 2) this.initialDistance = null;

if (e.touches.length === 0) isDragging = false;

});
}
});
</script>

</head>

<body style="margin:0; background:black;">

<!-- NORMAL 3D MODEL (model-viewer) -->

<model-viewer
src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/yalanci.github.io@main/model.glb"
alt="3D Model"

loading="lazy"
reveal="interaction"

camera-controls
touch-action="pan-y"

ar
ar-modes="scene-viewer webxr"
ar-placement="floor"

shadow-intensity="0.8"
environment-image="neutral"

auto-rotate
auto-rotate-delay="2000"
rotation-per-second="20deg"

exposure="1"

scale="0.2 0.2 0.2"

style="width:100%; height:500px;">
</model-viewer>


<!-- MARKER AR -->

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled: false;"
renderer="logarithmicDepthBuffer: true; antialias: true;"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<a-marker type="pattern" url="marker.patt">

<a-entity
gltf-model="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/dthamlet.github.io@main/model.glb"
scale="0.5 0.5 0.5"
rotation="0 0 0"
touch-rotate-scale>
</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
